<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    
    <!-- Primary Meta Tags -->
    <title>Vertexia | Premium 3D E-Commerce</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="title" content="Vertexia | Premium 3D E-Commerce">
    <meta name="description" content="Experience the future of online shopping with interactive 3D product models, gamified checkouts, and premium aesthetics.">
    <meta name="theme-color" content="#1d4ed8" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://vertexia.store/">
    <meta property="og:title" content="Vertexia | Premium 3D E-Commerce">
    <meta property="og:description" content="Experience the future of online shopping with interactive 3D product models, gamified checkouts, and premium aesthetics.">
    <meta property="og:image" content="https://images.unsplash.com/photo-1542291026-7eec264c27ff?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://vertexia.store/">
    <meta property="twitter:title" content="Vertexia | Premium 3D E-Commerce">
    <meta property="twitter:description" content="Experience the future of online shopping with interactive 3D product models, gamified checkouts, and premium aesthetics.">
    <meta property="twitter:image" content="https://images.unsplash.com/photo-1542291026-7eec264c27ff?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80">

    <!-- Preconnect to external domains for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Premium Google Fonts: Inter for UI, Outfit for Headers -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
      /* Critical path CSS to prevent flash of unstyled content */
      body {
        margin: 0;
        font-family: 'Inter', sans-serif;
        background-color: #F8FAFC;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
      }
      
      h1, h2, h3, h4, h5, h6 {
        font-family: 'Outfit', sans-serif;
      }
      
      /* Dark mode critical styling */
      @media (prefers-color-scheme: dark) {
        body {
          background-color: #0A0F1C;
        }
      }
      
      /* Global Loader Fallback styles */
      #fallback-loader {
        position: fixed;
        inset: 0;
        background: #020617;
        z-index: 99999;
        display: flex;
        justify-content: center;
        align-items: center;
        transition: opacity 0.5s ease-out;
      }
      .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(255, 255, 255, 0.1);
        border-radius: 50%;
        border-top-color: #1d4ed8;
        animation: spin 1s ease-in-out infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <!-- Fallback loader before React boots up -->
    <div id="fallback-loader">
        <div class="spinner"></div>
    </div>
    
    <div id="root"></div>
    
    <script>
      // Remove fallback loader once React is ready to render its internal GlobalLoader
      window.addEventListener('load', () => {
         setTimeout(() => {
             const loader = document.getElementById('fallback-loader');
             if (loader) {
                 loader.style.opacity = '0';
                 setTimeout(() => loader.remove(), 500);
             }
         }, 100);
      });
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
